name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Package Tic.app
        run: VERSION="${GITHUB_REF_NAME#v}" ./scripts/package.sh

      - name: Zip
        run: ditto -c -k --keepParent dist/Tic.app "dist/Tic-${GITHUB_REF_NAME}.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/Tic-${GITHUB_REF_NAME}.zip" \
            --title "Tic $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md
