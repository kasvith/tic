name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Package Tic.app
        run: VERSION="${GITHUB_REF_NAME#v}" ./scripts/package.sh

      - name: Zip
        run: ditto -c -k --keepParent dist/Tic.app "dist/Tic-${GITHUB_REF_NAME}.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -s RELEASE_NOTES.md ] || echo "Release $GITHUB_REF_NAME" > RELEASE_NOTES.md
          gh release create "$GITHUB_REF_NAME" \
            "dist/Tic-${GITHUB_REF_NAME}.zip" \
            --title "Tic $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md

      # Refresh the committed CHANGELOG.md — only at release time (not on every push).
      - name: Switch to main
        run: git checkout main

      - name: Regenerate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "docs(changelog): update for ${GITHUB_REF_NAME} [skip ci]"
            git push origin main
          fi
